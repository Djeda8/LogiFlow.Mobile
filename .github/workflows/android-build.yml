name: Build and Distribute Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  MAJOR_VERSION: 1
  MINOR_VERSION: 2
  PATCH_VERSION: 1

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup .NET ──────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ── 3. Install MAUI workload ───────────────────────────────────────
      - name: Install MAUI workload
        run: dotnet workload install maui

      # ── 4. Inject Anthropic API key ────────────────────────────────────
      #    Secret: Settings → Secrets and variables → Actions → New repository secret
      #    Name:   ANTHROPIC_API_KEY
      #    Value:  sk-ant-api03-XXXXXXXXXXXX  (tu clave real de console.anthropic.com)
      - name: Inject Anthropic API key into appsettings.json
        shell: pwsh
        run: |
          $path = "LogiFlow.Mobile/appsettings.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.Anthropic.ApiKey = "${{ secrets.ANTHROPIC_API_KEY }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content $path -Encoding UTF8
          Write-Host "✅ API key injected (length: $($json.Anthropic.ApiKey.Length) chars)"

      # ── 5. Restore dependencies ────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore LogiFlow.Mobile/LogiFlow.Mobile.csproj -p:TargetFrameworks=net9.0-android

      # ── 6. Run tests ───────────────────────────────────────────────────
      - name: Run tests
        run: dotnet test LogiFlow.Mobile.Tests/LogiFlow.Mobile.Tests.csproj --configuration Release

      # ── 7. Build Android APK ───────────────────────────────────────────
      - name: Build Android APK
        run: |
          dotnet publish LogiFlow.Mobile/LogiFlow.Mobile.csproj `
            -f net9.0-android `
            -c Release `
            --no-restore `
            -p:AndroidSdkDirectory=$env:ANDROID_SDK_ROOT `
            -p:AndroidPackageFormat=apk `
            -p:ApplicationVersion=${{ github.run_number }} `
            -p:ApplicationDisplayVersion=${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ env.PATCH_VERSION }}

      # ── 8. Find APK ────────────────────────────────────────────────────
      - name: Find APK
        id: find_apk
        run: |
          $apk = Get-ChildItem -Recurse -Filter "*.apk" | Where-Object { $_.FullName -notlike "*unsigned*" } | Select-Object -First 1
          echo "APK_PATH=$($apk.FullName)" >> $env:GITHUB_OUTPUT

      # ── 9. Read release notes ──────────────────────────────────────────
      - name: Read release notes
        id: release_notes
        run: |
          $notes = Get-Content RELEASE_NOTES.md -Raw
          echo "NOTES<<EOF" >> $env:GITHUB_OUTPUT
          echo $notes >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      # ── 10. Upload to Firebase App Distribution ────────────────────────
      - name: Upload to Firebase App Distribution
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute "${{ steps.find_apk.outputs.APK_PATH }}" `
            --app "${{ secrets.FIREBASE_APP_ID }}" `
            --token "${{ secrets.FIREBASE_TOKEN }}" `
            --groups "testers" `
            --release-notes "${{ steps.release_notes.outputs.NOTES }}"
