name: Build and Distribute Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore LogiFlow.Mobile/LogiFlow.Mobile.csproj

      - name: Run tests
        run: dotnet test LogiFlow.Mobile.Tests/LogiFlow.Mobile.Tests.csproj --configuration Release

      - name: Build Android APK
        run: dotnet publish LogiFlow.Mobile/LogiFlow.Mobile.csproj -f net9.0-android -c Release --no-restore -p:AndroidSdkDirectory=$env:ANDROID_SDK_ROOT -p:AndroidPackageFormat=apk

      - name: Find APK
        id: find_apk
        run: |
          $apk = Get-ChildItem -Recurse -Filter "*.apk" | Where-Object { $_.FullName -notlike "*unsigned*" } | Select-Object -First 1
          echo "APK_PATH=$($apk.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload to Firebase App Distribution
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute "${{ steps.find_apk.outputs.APK_PATH }}" `
            --app "${{ secrets.FIREBASE_APP_ID }}" `
            --token "${{ secrets.FIREBASE_TOKEN }}" `
            --release-notes "Build from commit ${{ github.sha }}"